services:
  - type: web
    name: cs-and-cr-reviewer-rmv-assistant
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SECRET
        generateValue: true
      - key: BASE_URL
        value: https://cs-and-cr-reviewer-rmv-assistant.onrender.com
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: DATA_DIR
        value: /var/data
      - key: USERS_CSV_URL
        value: https://docs.google.com/spreadsheets/d/e/2PACX-1vRL62WPx9XHBupiNkonZHwGqlyXS3ugIsZDDTBKEMX8rpX_i758D6uXkY2j8JSuYGEisPk1eJ28MryC/pub?gid=0&single=true&output=csv
      - key: SMTP_HOST
        value: mail.privateemail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
    disk:
      name: rmv-data
      mountPath: /var/data
      sizeGB: 1
